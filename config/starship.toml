format = """
$username\
[Óāį](bg:#35284f fg:#1e2130)\
$directory\
[Óāį](bg:#653070 fg:#35284f)\
${custom.git_branch}\
${custom.git_status}\
${custom.jj}\
[Óāį](bg:#853973 fg:#653070)\
$gradle\
$java\
$nodejs\
$rust\
[Óāį](bg:#a94858 fg:#853973)\
$hostname\
[Óāį](bg:#b38067 fg:#a94858)\
$time\
[Óāį ](bg:#2a3058 fg:#b38067)\
$status\
[Óāį ](bg:#1e2130 fg:#2a3058)\
$line_break \
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#1e2130"
style_root = "bg:#1e2130"
format = '[ūü¶č ]($style)'
disabled = false

[directory]
style = "bg:#35284f fg:#e2bbea"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ůįąôÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ůįąô " = " ůįąôÔĄ™ "

[hostname]
ssh_only = false
style = "bg:#a94858 fg:#f4fcf3"
format = '[$ssh_symbol$hostname]($style)'

[custom.git_branch]
command = '''starship module git_branch'''
format = "$output"
detect_folders = [".git", "!.jj"]

[custom.git_status]
command = '''starship module git_status'''
format = "$output"
detect_folders = [".git", "!.jj"]

[git_branch]
#disabled = false
symbol = "Ôźė"
style = "bg:#653070"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#653070"
format = '[$all_status$ahead_behind ]($style)'

[custom.jj]
command = '''starship-jj --ignore-working-copy starship prompt'''
#symbol = "ūü•č "
symbol = "ūü™Ą "
#symbol = "ÔźėůĪóÜ "
style = "bg:#653070"
format = "[$symbol$output]($style)"
detect_folders = [".jj"]

[gradle]
style = "bg:#853973 fg:#fbfaf2"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:#853973 fg:#fbfaf2"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#853973 fg:#fbfaf2"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "Óě®"
style = "bg:#853973 fg:#fbfaf2"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R"              # Hour:Minute Format
style = "bg:#b38067 fg:#5f458f"
format = '[ ‚ô• $time ]($style)'

[status]
#pipestatus_format = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int](bg:#2e2130 fg:#f9e4cc)'
disabled = false
map_symbol = true
pipestatus = false
#success_style = "bg:#2a3058 fg:#f9e4cc"
#failure_style = "bg:#2a3058 fg:#f9b4aa"
format = '[$symbol $status ]($style)[ Óāį]($style)'
#success_style = "bg:#2e2130 fg:#f9e4cc"
#pipestatus_segment_format = "[$symbol$status](bg:#2e2130)"

[line_break]
disabled = false
